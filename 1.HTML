<!DOCTYPE html>
<html>
<head>
<title>Guess Game</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h2>Guess Number (1-10)</h2>
<input id="num">
<button onclick="check()">Check</button>
<p id="res"></p>

<script>
let random = Math.floor(Math.random()*10)+1;

function check(){
let user = document.getElementById("num").value;
if(user == random){
document.getElementById("res").innerHTML = "🎉 Correct!";
}else{
document.getElementById("res").innerHTML = "❌ Try Again!";
}
}
</script>

</body>
</html>
