<!DOCTYPE html>
<html>
<body style="text-align:center;">

<h2>Calculator</h2>
<input id="a"> + <input id="b">
<button onclick="add()">=</button>
<p id="ans"></p>

<script>
function add(){
let x = Number(a.value);
let y = Number(b.value);
ans.innerHTML = x + y;
}
</script>

</body>
</html>
