<!DOCTYPE html>
<html>
<body style="text-align:center;">

<h2>Color Changer</h2>
<button onclick="change()">Change Color</button>

<script>
function change(){
let colors = ["red","blue","green","yellow","pink"];
document.body.style.background = colors[Math.floor(Math.random()*5)];
}
</script>

</body>
</html>
