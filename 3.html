<!DOCTYPE html>
<html>
<body style="text-align:center;">

<h2>Table Generator</h2>
<input id="num">
<button onclick="table()">Show</button>
<p id="output"></p>

<script>
function table(){
let n = num.value;
let txt="";
for(let i=1;i<=10;i++){
txt += n + " x " + i + " = " + (n*i) + "<br>";
}
output.innerHTML = txt;
}
</script>

</body>
</html>
